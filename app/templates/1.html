<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script src="http://ajax.googleapis.com/ajax/libs/angularjs/1.4.9/angular.min.js"></script>
<script>
    (function () {
        'use strict';
        angular.module('DOIApp', [])


            .controller('DOIController', ['$scope', '$log', '$http',
                function ($scope, $log, $http) {
                    $scope.buttontext = 'Submit';
                    $scope.loading = false;
                    $scope.hide = false;

                    $scope.getResults = function () {
                        $scope.loading = true;
                        $scope.buttontext = 'Loading...';

                        var url = 'https://api.crossref.org/works';
                        var title = angular.element(document.getElementsByName('article_title')[0]).val();
                        var authors = angular.element(document.getElementsByName('article_authors')[0]).val();

                        $http({
                            url: url,
                            method: "GET",
                            params: {
                                "query.title": title,
                                "query.author": authors,
                                "mailto": "daniel.boyko.al@gmail.com"
                            }
                        }).success(function (results) {
                            $scope.doi = results['message']['items'][0]['DOI'];
                            $scope.hide = true;
                            $http({
                                url: '/add_'
                            })
                        }).error(function (error) {
                            $log.log(error);
                        });

                    };
                }
            ]);

    }());
</script>
<div ng-app="DOIApp" ng-controller="DOIController">
    <div id="bla">
        <input type="hidden" value="A quantitative study of the effects of different grades of polyvinyl alcohol on the activities of certain enzymes in unfixed tissue sections.
" name="article_title" ng-model="article_title">
        <input type="hidden" value="Henderson B , Loveridge N , Robertson W R" name="article_authors"
               ng-model="article_authors">
        {% raw %}
        <button class="btn btn-primary"
                ng-disabled="loading" ng-hide="hide" ng-click="getResults()">{{ buttontext }}
        </button>
        {% endraw %}
        {% raw %}
        <a href="http://dx.doi.org/{{ doi }}">{{ doi }}</a>
        {% endraw %}

    </div>
</div>
<link rel="canonical" href="https://www.altmetric.com/products/altmetric-badges/">
<div data-badge-popover="right" data-badge-type="1" data-doi="10.1038/nature.2014.14583" data-hide-no-mentions="true" class="altmetric-embed"></div>

</body>
</html>
