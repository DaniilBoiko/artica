{% extends "base.html" %}

{% block app_content %}
    <section class="jumbotron text-center">
        <div class="container">
            <h1 class="jumbotron-heading">This is an abstract page</h1>
            <p class="lead text-muted">It's designed specially for us</p>

        </div>
    </section>

    <div class="container text-center">
        <h1>American chemical society</h1>
        <br>
        <form action="
                {{ url_for('update_abs') }}"
              method="get">
            <div class="form-group">
                <label for="firstid">ID for the first article</label>
                <input type="text" class="form-control" id="firstid" name="firstid">
            </div>
            <div class="form-group">
                <label for="lastid">ID for the last article</label>
                <input type="text" class="form-control" id="lastid" name="lastid">
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
{% endblock %}
