{% extends "base.html" %}

{% block app_content %}
<style>
    .text {
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        line-height: 16px; /* fallback */
        max-height: 64px; /* fallback */
        -webkit-line-clamp: 4; /* number of lines to show */
        -webkit-box-orient: vertical;
    }
</style>
<div class="page-header">
    <h1 class="page-title">
        That's what happened while you were away.
    </h1>
    <div class="row mt-4 row-cards row-deck">
        {% for entry in entries %}
        <div class="col-sm-6 col-xl-3">
            <div class="card">
                <a href="{{ entry.link }}"><img class="card-img-top" src="{{ entry.media_thumbnail[0]['url'] }}"></a>
                <div class="card-body d-flex flex-column">
                    <h4><a href="{{ entry.link }}">{{ entry.title }}</a></h4>
                    <div class="text-muted text">{{entry.summary}}</div>
                    <div class="d-flex align-items-center pt-5 mt-auto">
                        <div>
                            <a href="#" class="text-default">Science</a>
                            <small class="d-block text-muted">{{ entry.published }}</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>
{% endblock %}
