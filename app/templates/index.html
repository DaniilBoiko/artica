{% extends "base.html" %}

{% block app_content %}
    <section class="jumbotron text-center">
        <div class="container">
            <img src="{{ url_for('static', filename='images/logo.svg') }}" class="text-center mt-5 mb-4" height="30"
                 alt="">

            <h1 class="jumbotron-heading">Bringing AI and science together</h1>
            <p class="lead text-muted">We have made a system that will completely change all scientific research. Just try it.</p>

            <form class="form-inline justify-content-center" action="/search" method="get">
                <input name="query" type="text" class="form-control mb-2 mr-sm-2 col-md-6"
                       placeholder="Palladium–complex"/>
                <button type="submit" class="btn btn-primary mb-2">Search</button>
            </form>

            <a class="btn btn-lg btn-light mt-5" href="/login">Login via Mendeley</a>

        </div>
    </section>

{% endblock %}
