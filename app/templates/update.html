{% extends "base.html" %}

{% block app_content %}
    <section class="jumbotron text-center">
        <div class="container">
            <h1 class="jumbotron-heading">This is an update page</h1>
            <p class="lead text-muted">Here you can control this process</p>

        </div>
    </section>

    <script src="//code.jquery.com/jquery-2.2.1.min.js"></script>
    <script src="//netdna.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
    <script src="//ajax.googleapis.com/ajax/libs/angularjs/1.4.5/angular.min.js"></script>


    <script>
        (function () {

            'use strict';

            angular.module('WordcountApp', [])

                .controller('WordcountController', ['$scope', '$log', '$http', '$timeout',
                    function ($scope, $log, $http, $timeout) {

                        $scope.submitButtonText = 'Submit';
                        $scope.loading = false;
                        $scope.urlerror = false;

                        $scope.getResults = function () {

                            $log.log('test');

                            // get the URL from the input
                            var userInput = $scope.url;

                            // fire the API request
                            $http.post('/start', {'url': userInput}).success(function (results) {
                                $log.log(results);
                                getWordCount(results);
                                $scope.wordcounts = null;
                                $scope.loading = true;
                                $scope.submitButtonText = 'Loading...';
                                $scope.urlerror = false;
                            }).error(function (error) {
                                $log.log(error);
                            });

                        };

                        function getWordCount(jobID) {

                            var timeout = '';

                            var poller = function () {
                                // fire another request
                                $http.get('/results/' + jobID).success(function (data, status, headers, config) {
                                    if (status === 202) {
                                        $log.log(data, status);
                                    } else if (status === 200) {
                                        $log.log(data);
                                        $scope.loading = false;
                                        $scope.submitButtonText = "Submit";
                                        $scope.wordcounts = data;
                                        $timeout.cancel(timeout);
                                        return false;
                                    }
                                    // continue to call the poller() function every 2 seconds
                                    // until the timeout is cancelled
                                    timeout = $timeout(poller, 2000);
                                }).error(function (error) {
                                    $log.log(error);
                                    $scope.loading = false;
                                    $scope.submitButtonText = "Submit";
                                    $scope.urlerror = true;
                                });
                            };

                            poller();

                        }

                    }])

        }());


    </script>
    <div class="container text-center">
        <h1>American chemical society</h1>
        <table class="table">
            <th>
                <tr>Journal</tr>
                <tr>Status</tr>
            </th>
            {% for journal in acs %}
                <th>
                    <tr>{{ journal.name }}</tr>
                    <tr>{{ journal.job_id }}</tr>
                </th>
            {% endfor %}
        </table>
    </div>
{% endblock %}
