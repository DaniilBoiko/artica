{% extends "base.html" %}

{% block app_content %}
    <section class="jumbotron text-center">
        <div class="container">
            <h1 class="jumbotron-heading">This is an update page</h1>
            <p class="lead text-muted">Here you can control this process</p>

        </div>
    </section>

    <script src="//code.jquery.com/jquery-2.2.1.min.js"></script>
    <script src="//netdna.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
    <script src="//ajax.googleapis.com/ajax/libs/angularjs/1.4.5/angular.min.js"></script>


    <script>
        (function () {

            'use strict';

            angular.module('App', [])

                .controller('Controller', ['$scope', '$log', '$http', '$timeout',
                    function ($scope, $log, $http, $timeout) {

                        $scope.statustext = 'Waiting';
                        $scope.urlerror = false;
                        $scope.ids = [
                            {% for journal in acs %}
                                '{{ journal.job_id }}'
                                {{ "," if not loop.last }}
                            {% endfor %}
                        ];

                        $scope.init = function () {

                            $log.log('test');

                            angular.forEach($scope.ids, function (id) {
                                get_status(id);
                            });

                            $scope.statustext = 'Loading...';

                        };

                        function get_status(jobID) {

                            var timeout = '';

                            var poller = function () {
                                // fire another request
                                $http.get('/results/' + jobID).success(function (data, status, headers, config) {
                                    if (status === 202) {
                                        $log.log(data, status);
                                    } else if (status === 200) {
                                        $log.log(data);
                                        var elementbyid = angular.element(document.querySelector('#a' + jobID));
                                        elementbyid.html('<a href class="btn btn-sm btn-success">Done</a>');
                                        $timeout.cancel(timeout);
                                        return false;
                                    }
                                    // continue to call the poller() function every 2 seconds
                                    // until the timeout is cancelled
                                    timeout = $timeout(poller, 2000);
                                }).error(function (error) {
                                    $log.log(error);
                                    var elementbyid = angular.element(document.querySelector('#a' + jobID));
                                    elementbyid.html('<a href class="btn btn-sm btn-danger">Error</a>');
                                })
                            };

                            poller();

                        }

                    }])

        }());


    </script>
    <div class="container text-center">
        <h1>American chemical society</h1>
        <br>
        <a class="btn btn-dark btn-lg"
           href="{{ url_for('update_journals',task='parse',token='64E80F015881BF456198E9DAECB22B23D52CC45E2DE4708780E20F0E28F76CB0') }}">Start
            update</a>
        <div ng-app="App" ng-controller="Controller" ng-init="init()">
            <table class="table">
                <tr>
                    <th>Journal</th>
                    <th>Status</th>
                </tr>
                {% for journal in acs %}
                    <tr>
                        <td>{{ journal.name }}</td>
                        <td id="a{{ journal.job_id }}">{% raw %} {{ statustext }} {% endraw %}</td>
                    </tr>
                {% endfor %}
            </table>
        </div>
    </div>
{% endblock %}
